<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆手环</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }
        .card { background: white; border-radius: 8px; padding: 40px 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 60px; }
        .message-content { font-size: 18px; color: #2c2c2c; margin-bottom: 30px; min-height: 100px; line-height: 1.8; white-space: pre-wrap; }
        .message-date { font-size: 14px; color: #666; text-align: right; padding-top: 20px; border-top: 1px solid #e0e0e0; min-height: 20px; }
        .refresh-btn { display: block; width: 100%; padding: 12px; margin-top: 20px; background: #4a4a4a; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .refresh-btn:hover { background: #333; }
        .manage-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 13px; cursor: pointer; }
        .manage-link:hover { color: #333; }
        .manage-view { display: none; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 20px; color: #2c2c2c; margin-bottom: 10px; }
        .header-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; background: #e0e0e0; color: #333; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn:hover { background: #d0d0d0; }
        .btn-danger { background: #ffcccc; color: #900; }
        .add-form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-hint { font-size: 11px; color: #999; margin-top: 5px; }
        .submit-btn { width: 100%; padding: 12px; background: #4a4a4a; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .submit-btn:hover { background: #333; }
        .items-list { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .items-list h2 { font-size: 16px; color: #2c2c2c; margin-bottom: 15px; }
        .item { padding: 15px; border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 10px; }
        .item.editing { background: #f9f9f9; }
        .item-content { font-size: 14px; color: #333; margin-bottom: 8px; white-space: pre-wrap; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #999; }
        .item-actions { display: flex; gap: 10px; }
        .item-actions button { padding: 4px 12px; background: #e0e0e0; color: #666; border: none; border-radius: 3px; font-size: 12px; cursor: pointer; }
        .item-actions button:hover { background: #d0d0d0; color: #333; }
        .item-actions .save-btn { background: #4a4a4a; color: white; }
        .edit-form textarea, .edit-form input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
        .edit-form textarea { min-height: 60px; }
        .empty-state { text-align: center; color: #999; padding: 40px 20px; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-size: 18px; color: #2c2c2c; margin-bottom: 15px; }
        .modal-body { margin-bottom: 20px; }
        .modal-body textarea { width: 100%; min-height: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: monospace; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btn { padding: 8px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .modal-btn-primary { background: #4a4a4a; color: white; }
        .modal-btn-secondary { background: #e0e0e0; color: #333; }
        .help-text { font-size: 12px; color: #999; margin-bottom: 10px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container" id="displayView">
        <div class="card">
            <div class="message-content" id="messageContent">加载中...</div>
            <div class="message-date" id="messageDate"></div>
            <button class="refresh-btn" id="refreshBtn">换一条</button>
            <span class="manage-link" id="manageLink">管理信息</span>
        </div>
    </div>

    <div class="container manage-view" id="manageView">
        <div class="header">
            <h1>信息管理</h1>
            <div class="header-actions">
                <button class="btn" id="backBtn">返回</button>
                <button class="btn" id="importBtn">导入</button>
                <button class="btn" id="exportBtn">导出</button>
                <button class="btn btn-danger" id="clearBtn">清空数据</button>
            </div>
        </div>
        <div class="add-form">
            <div class="form-group">
                <label>信息内容</label>
                <textarea id="newContent" placeholder="输入信息内容..."></textarea>
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="text" id="newDate" value="1900-01-01">
                <div class="form-hint">通用：1900-01-01 | 特定日期：2026-02-01 | 季节性：1900-S12-01</div>
            </div>
            <button class="submit-btn" id="addBtn">添加信息</button>
        </div>
        <div class="items-list">
            <h2>已保存的信息</h2>
            <div id="itemsList"></div>
        </div>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">导入信息</div>
            <div class="modal-body">
                <div class="help-text">格式：内容|||日期，每行一条</div>
                <textarea id="importText" placeholder="粘贴要导入的信息..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" id="importCancelBtn">取消</button>
                <button class="modal-btn modal-btn-primary" id="importConfirmBtn">导入</button>
            </div>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">导出信息</div>
            <div class="modal-body">
                <textarea id="exportText" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" id="exportCloseBtn">关闭</button>
                <button class="modal-btn modal-btn-primary" id="exportCopyBtn">复制</button>
            </div>
        </div>
    </div>

    <script>
        var STORAGE_KEY = 'nfc_messages';
        var editingId = null;
        var lastMessageId = null;

        function $(id) { return document.getElementById(id); }

        function getMessages() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];
                var data = JSON.parse(raw);
                if (!Array.isArray(data)) return [];
                return data;
            } catch (e) {
                return [];
            }
        }

        function saveMessages(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        function toUSDate(dateStr) {
            var parts = dateStr.split('-');
            var year = parseInt(parts[0]);
            var month = parseInt(parts[1]);
            var day = parseInt(parts[2]);
            var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            return months[month-1] + ' ' + day + ', ' + year;
        }

        function formatDateLabel(date) {
            if (date === '1900-01-01') return '通用信息';
            if (date.indexOf('-S') !== -1) return '季节性（' + date.split('-S')[1].split('-')[0] + '月±1月）';
            return date;
        }

        function isInSeason(dateStr) {
            if (dateStr.indexOf('-S') === -1) return false;
            var centerMonth = parseInt(dateStr.split('-S')[1]);
            var currentMonth = new Date().getMonth() + 1;
            var diff = Math.abs(currentMonth - centerMonth);
            return diff <= 1 || diff >= 11;
        }

        function getMessageWeight(msg) {
            // 返回权重：历史上的今天=100，最近7天=50，季节性=20，通用=10
            var today = new Date();
            var todayMonth = today.getMonth() + 1;
            var todayDay = today.getDate();
            var date = msg.date;

            if (!date) return 0;

            // 通用信息
            if (date === '1900-01-01') return 10;

            // 季节性信息
            if (date.indexOf('-S') !== -1) {
                return isInSeason(date) ? 20 : 0;
            }

            // 特定日期
            var parts = date.split('-');
            if (parts.length !== 3) return 10;
            var month = parseInt(parts[1]);
            var day = parseInt(parts[2]);

            // 历史上的今天
            if (month === todayMonth && day === todayDay) return 100;

            // 最近7天（同月）
            if (month === todayMonth && Math.abs(todayDay - day) <= 7) return 50;

            // 其他日期当作通用
            return 10;
        }

        function selectMessage() {
            var messages = getMessages();

            if (messages.length === 0) {
                return { content: '还没有添加任何信息，请点击下方"管理信息"添加。', date: '', id: null };
            }

            // 构建加权池
            var pool = [];
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                var weight = getMessageWeight(msg);
                if (weight > 0) {
                    // 根据权重添加多次
                    for (var j = 0; j < weight; j++) {
                        pool.push(msg);
                    }
                }
            }

            if (pool.length === 0) {
                // 兜底：随机选一条
                return messages[Math.floor(Math.random() * messages.length)];
            }

            // 如果只有一条消息，直接返回
            if (messages.length === 1) {
                return messages[0];
            }

            // 尝试选择不同于上一条的消息
            var attempts = 0;
            var selected;
            do {
                selected = pool[Math.floor(Math.random() * pool.length)];
                attempts++;
            } while (selected.id === lastMessageId && attempts < 10);

            return selected;
        }

        function loadRandomMessage() {
            var msg = selectMessage();
            lastMessageId = msg.id;
            $('messageContent').textContent = msg.content;
            var isSpecific = msg.date && msg.date !== '1900-01-01' && msg.date.indexOf('-S') === -1;
            $('messageDate').textContent = isSpecific ? toUSDate(msg.date) : '';
        }

        function renderList() {
            var messages = getMessages();
            var container = $('itemsList');
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有添加任何信息</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                if (editingId === msg.id) {
                    html += '<div class="item editing"><div class="edit-form">' +
                        '<textarea id="edit-content-' + msg.id + '">' + msg.content + '</textarea>' +
                        '<input type="text" id="edit-date-' + msg.id + '" value="' + msg.date + '">' +
                        '</div><div class="item-meta"><span></span><div class="item-actions">' +
                        '<button class="save-btn" data-save="' + msg.id + '">保存</button>' +
                        '<button data-cancel="1">取消</button></div></div></div>';
                } else {
                    html += '<div class="item"><div class="item-content">' + msg.content + '</div>' +
                        '<div class="item-meta"><span>' + formatDateLabel(msg.date) + '</span>' +
                        '<div class="item-actions"><button data-edit="' + msg.id + '">编辑</button>' +
                        '<button data-delete="' + msg.id + '">删除</button></div></div></div>';
                }
            }
            container.innerHTML = html;
        }

        function showManage() {
            $('displayView').style.display = 'none';
            $('manageView').style.display = 'block';
            renderList();
        }

        function showDisplay() {
            $('displayView').style.display = 'block';
            $('manageView').style.display = 'none';
            loadRandomMessage();
        }

        $('refreshBtn').onclick = function() {
            loadRandomMessage();
        };

        $('manageLink').onclick = showManage;
        $('backBtn').onclick = showDisplay;

        $('clearBtn').onclick = function() {
            if (confirm('确定清空所有数据？')) {
                localStorage.removeItem(STORAGE_KEY);
                renderList();
                alert('已清空');
            }
        };

        $('addBtn').onclick = function() {
            var content = $('newContent').value.trim();
            var date = $('newDate').value.trim();
            if (!content) { alert('请输入信息内容'); return; }
            var messages = getMessages();
            messages.push({ id: Date.now(), content: content, date: date });
            saveMessages(messages);
            $('newContent').value = '';
            $('newDate').value = '1900-01-01';
            renderList();
        };

        $('itemsList').onclick = function(e) {
            var btn = e.target;
            if (btn.dataset.edit) {
                editingId = Number(btn.dataset.edit);
                renderList();
            } else if (btn.dataset.save) {
                var id = Number(btn.dataset.save);
                var content = $('edit-content-' + id).value.trim();
                var date = $('edit-date-' + id).value.trim();
                if (!content) { alert('请输入信息内容'); return; }
                var messages = getMessages();
                for (var i = 0; i < messages.length; i++) {
                    if (messages[i].id === id) {
                        messages[i].content = content;
                        messages[i].date = date;
                        break;
                    }
                }
                saveMessages(messages);
                editingId = null;
                renderList();
            } else if (btn.dataset.cancel) {
                editingId = null;
                renderList();
            } else if (btn.dataset.delete) {
                if (!confirm('确定删除？')) return;
                var id = Number(btn.dataset.delete);
                var messages = getMessages();
                var newMessages = [];
                for (var i = 0; i < messages.length; i++) {
                    if (messages[i].id !== id) newMessages.push(messages[i]);
                }
                saveMessages(newMessages);
                renderList();
            }
        };

        $('importBtn').onclick = function() {
            $('importModal').style.display = 'block';
            $('importText').value = '';
        };

        $('importCancelBtn').onclick = function() {
            $('importModal').style.display = 'none';
        };

        $('importConfirmBtn').onclick = function() {
            var text = $('importText').value.trim();
            if (!text) { alert('请输入内容'); return; }
            var messages = getMessages();
            var count = 0;
            var lines = text.split('\n');
            for (var i = 0; i < lines.length; i++) {
                var parts = lines[i].split('|||');
                if (parts.length >= 2) {
                    var content = parts[0].trim();
                    var date = parts[1].trim();
                    if (content && date) {
                        messages.push({ id: Date.now() + count, content: content, date: date });
                        count++;
                    }
                }
            }
            if (count > 0) {
                saveMessages(messages);
                alert('导入 ' + count + ' 条');
                $('importModal').style.display = 'none';
                renderList();
            } else {
                alert('格式错误');
            }
        };

        $('exportBtn').onclick = function() {
            var messages = getMessages();
            if (messages.length === 0) { alert('没有数据'); return; }
            var text = '';
            for (var i = 0; i < messages.length; i++) {
                text += messages[i].content + '|||' + messages[i].date + '\n';
            }
            $('exportText').value = text;
            $('exportModal').style.display = 'block';
        };

        $('exportCloseBtn').onclick = function() {
            $('exportModal').style.display = 'none';
        };

        $('exportCopyBtn').onclick = function() {
            $('exportText').select();
            document.execCommand('copy');
            alert('已复制');
        };

        window.onclick = function(e) {
            if (e.target === $('importModal')) $('importModal').style.display = 'none';
            if (e.target === $('exportModal')) $('exportModal').style.display = 'none';
        };

        loadRandomMessage();
    </script>
</body>
</html>
